# GitHub Monitoring Agent Configuration

[agent]
name = "github-monitor"
description = "Monitors GitHub repositories and learns from development patterns"

[schedule]
interval = "15m"
method = "launchd"  # or "cron" on Linux

[boundaries]
# Actions the agent can take autonomously
autonomous = [
    "read_repos",
    "analyze_patterns",
    "create_reports",
    "learn_trends",
    "update_memory",
    "write_insights"
]

# Actions requiring human approval
requires_approval = [
    "create_issues",
    "comment_on_prs",
    "modify_repo_settings",
    "send_notifications",
    "contact_team_members"
]

[memory]
backend = "broca"
path = "memory/"

[llm]
provider = "claude"
model = "claude-sonnet-4"

# GitHub-specific configuration
[extensions.github]
# Repositories to monitor (comma-separated)
# Leave empty to monitor all user repositories
monitored_repos = "your-org/repo1,your-org/repo2"

# Alert thresholds
max_issue_age_days = 30
min_pr_merge_rate = 0.7
security_alert_priority = "high"

[logging]
level = "info"
retain_days = 30