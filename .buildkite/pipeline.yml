env:
  CARGO_TERM_COLOR: always

steps:
  - label: ":github: PR coverage handled by GitHub Actions"
    key: pr-github-actions
    if: build.pull_request.id != null
    agents:
      queue: "ci-linux-arm64"
    timeout_in_minutes: 5
    command: |
      set -euo pipefail
      echo "Buildkite Tart jobs are disabled for pull requests."
      echo "Pull request validation runs in GitHub Actions."

  - label: ":fast_forward: Topic-branch push - covered by the branch's PR in GitHub Actions"
    key: branch-github-actions
    if: build.pull_request.id == null && build.branch != "main"
    agents:
      queue: "ci-linux-arm64"
    timeout_in_minutes: 5
    command: |
      set -euo pipefail
      echo "Buildkite main status checks run on main only."
      echo "Topic branches are validated by GitHub Actions via their pull requests."

  - group: "Buildkite main status"
    if: build.pull_request.id == null && build.branch == "main"
    steps:
      - label: ":buildkite: Main status check"
        key: main-status-check
        timeout_in_minutes: 5
        agents:
          queue: "ci-linux-arm64"
        command: |
          set -euo pipefail
          echo "Buildkite main status check."
          echo "Full Rust, Bash, PowerShell, and Pages validation runs in GitHub Actions."
          buildkite-agent --version
